swagger: '2.0'
info:
  version: 1.0.3
  title: RIT Client REST API
  description: |
    # Overview
    The *REMOVED* Interactive Trader (RIT) allows users to query market data and submit trading instructions through a REST API, as well as through a Microsoft Excel VBA API. The REST API is further categorized into two approaches: the Client REST API and the DMA (Direct Market Access) REST API. While these two appraoches use the same REST API type,  they differ in the connection endpoints. The Client REST API connects to the RIT Client, whereas the DMA REST API connects directly to the RIT Instructor App (Server). This webpage aims to provide detailed information on the **Client REST API**. If you are looking for detailed information about Excel VBA API, please click **[here](https://306w.s3.amazonaws.com/rit_cases/Help/Student/RIT%20-%20User%20Guide%20-%20VBA%20API%20Documentation.pdf)**. For the DMA REST API, please click **[here](https://rit.306w.ca/RIT-DMA-API/1.0.4/)**.
    
    The Client REST API is a simple interface for interacting with the *REMOVED* Interactive Trader (RIT) Client. RIT Client must be running to access this API. Responses are always [JSON objects](https://www.w3schools.com/js/js_json_objects.asp). Successful requests always return with HTTP code `200`. Unsuccessful responses have HTTP error codes between `400` and `500`. Most programming languages have ways to interact with this kind of API. Some resources:
    
    - MATLAB https://www.mathworks.com/help/mps/restful-api-and-json.html?requestedDomain=www.mathworks.com
    - C# https://docs.microsoft.com/en-us/aspnet/web-api/overview/advanced/calling-a-web-api-from-a-net-client
    - Python https://realpython.com/blog/python/api-integration-in-python/
    - Node https://www.npmjs.com/package/request 
    - VBA https://stackoverflow.com/questions/19553476/how-to-make-rest-call-with-vba-in-excel along with https://stackoverflow.com/questions/19360440/how-to-parse-json-with-vba-without-external-libraries
    
    # Configuration
    
    ![Status bar example.](https://rit.306w.ca/assets/status_1_0_3.png)
    
    The `API` icon indicates whether an API access is enabled. If there are any issues with starting the API, the icon will be **red** and clicking on it will reveal the associated error message. If the API is turned off, the icon will be greyed out. This icon applies to both Excel VBA API and REST API. Similarly, the `API Orders` icon indicates whether orders can be submitted via API.
    
    Users can click on this `API` icon in order to access more detailed information on interacting with the API.
    
    ![Config dialog example.](https://rit.306w.ca/assets/config_1_0_3.png)
    
    The REST API by default runs on port `9999` but that can be modified here. The API key (initially autogenerated) can also be changed here. The API will not be accessible without an API key configured. Clicking through the Authorize button below will initialize this page with the proper port and API key settings for a particular client instance and is the recommended way to start exploring this API.
    
    # Authentication
    
    The API key can be found by clicking on the `API` icon in the status bar once logged in. This key must be included in every request to the RIT API, either through the `X-API-Key` header or through the `key` query parameter. Requests without a matching key will be rejected with HTTP code `401`.
    
    # Rate Limiting
    
    Certain endpoints are rate-limited (indicated in the endpoint description). When a request is rejected due to rate-limiting, the response will have an HTTP error code of `429`. In addition, the response will have a `Retry-After` header and `wait` body parameter which indicates the number of seconds to wait before attempting the request again. 
    
    Note that in addition to the global rate limit on requests, securities may also have additional, more restrictive rate limits which apply to requests for those securities. The `Retry-After`/`wait` times in those cases correspond to the more restrictive rate limits. Requests for other securities with less restrictive rate limits may still be successful.
    
    Generally, most of the default RIT cases will have a very 'loose' rate-limiting otherwise changed by instructors. Therefore, it is not expected that users will often experience this response from rate-limiting.
    
    The Excel VBA API treats rate-limiting in a different way and instead queues any requests which exceed the rate limit (and executes them over time at the rate limit). If the Excel VBA API is used concurently with this Client REST API, endpoints which are rate-limited will reject requests if there are any queued requests. It is NOT advised to run both APIs simultaneously.
    
    # Additional Notes
    - Tickers are case-sensitive and should match what is displayed in the RIT Client.
    
host: localhost:9999
basePath: /v1
schemes:
  - http
securityDefinitions:
   APIKeyHeader:
     type: apiKey
     in: header
     name: X-API-Key
   APIKeyQueryParam:
     type: apiKey
     in: query
     name: key
security:
  - APIKeyHeader: []
  - APIKeyQueryParam: []
produces:
  - application/json
  
### MODELS ###       
  
definitions:
  Error:
    type: object
    properties:
      code:
        type: string
      message:
        type: string
    required:
      - code
  CaseStatus:
    type: string
    enum: &CASE_STATUS
      - ACTIVE
      - PAUSED
      - STOPPED
  OrderType:
    type: string
    enum: &ORDER_TYPE
      - MARKET
      - LIMIT
  SecurityType:
    type: string
    enum: &SECURITY_TYPE
      - SPOT
      - FUTURE
      - INDEX
      - OPTION
      - STOCK
      - CURRENCY
      - BOND
      - RATE
      - FORWARD
      - SWAP
      - SWAP_BOM
      - SPRE
  AssetType:
    type: string
    enum: &ASSET_TYPE
      - CONTAINER
      - PIPELINE
      - SHIP
      - REFINERY
      - POWER_PLANT
      - PRODUCER
  TickerQuantity:
    type: object
    properties:
      ticker:
        type: string
        example: CL
      quantity:
        type: number
        example: 10
  TickerPrice:
    type: object
    properties:
      ticker:
        type: string
        example: CL
      price:
        type: number
        example: 9.99
  OrderAction:
    type: string
    enum: &ORDER_ACTION
      - BUY
      - SELL
  OrderStatus:
    type: string
    enum: &ORDER_STATUS
      - OPEN
      - TRANSACTED
      - CANCELLED
  Order:
    type: object
    properties:
      order_id:
        type: integer
        example: 1221
      period:
        type: integer
        example: 1
      tick:
        type: integer
        example: 10
      trader_id:
        type: string
        example: trader49
      ticker:
        type: string
        description: Case sensitive.
        example: CRZY
      type:
        type: string
        enum: *ORDER_TYPE
        example: LIMIT
      quantity:
        type: number
        example: 100
      action:
        type: string
        enum: *ORDER_ACTION
      price:
        type: number
        description: Will be `null` if `type` is `LIMIT`.
        example: 14.21
      quantity_filled:
        type: number
        description: Always less than or equal to `quantity`.
        example: 10
      vwap:
        type: number
        description: Volume-weighted average price for transacted quantity. `null` if `quantity_filled` is `0`.
        example: 14.21
      status:
        type: string
        enum: *ORDER_STATUS
  AssetLease:
    type: object
    properties:
      id:
        type: integer
        description: Lease id.
      ticker:
        type: string
      type:
        type: string
        enum: *ASSET_TYPE
        example: CONTAINER
      start_lease_period:
        type: integer
      start_lease_tick:
        type: integer
      next_lease_period:
        type: integer
      next_lease_tick:
        type: integer
      convert_from:
        type: array
        items:
          $ref: '#/definitions/TickerQuantity'
      convert_to:
        type: array
        items:
          $ref: '#/definitions/TickerQuantity'
      containment_usage:
        type: integer
        description: Currently utilized capacity for CONTAINER type assets.
  SuccessResult:
    description: Placeholder result to indicate an operation was successful.
    type: object
    properties:
      success:
        type: boolean
        example: true

### RESPONSES ###        
        
responses:
  RateLimitExceeded:
    description: Rate limit exceeded.
    headers:
      Retry-After:
        type: number
        description: Number of seconds to wait before retrying request.
    schema:
      type: object
      allOf:
        - $ref: '#/definitions/Error'
      properties:
        wait:
          type: number
          description: Number of seconds to wait before retrying request.
      example:
        code: RATE_LIMIT_EXCEEDED
        wait: 0.215
  Unauthorized:
    description: Unauthorized.
    schema:
      type: object
      allOf:
        - $ref: '#/definitions/Error'
      example:
        code: UNAUTHORIZED

### PATHS ###

paths:

  '/case':
    get:
      summary: Gets information about the current case.
      description: Gets information about the current case.
      responses:
        200:
          description: OK
          schema:
            type: object
            properties:
              name:
                type: string
                description: Name of the current case.
              period:
                type: integer
                description: Current period.
              tick:
                type: integer
                description: Current tick.
              ticks_per_period:
                type: integer
                description: Ticks in each period.
              total_periods:
                type: integer
                description: Total periods in the case.
              status:
                type: string
                enum: *CASE_STATUS
                description: Current status of the case.
              is_enforce_trading_limits:
                type: boolean
                description: Whether trading limits are enforced, or if they can be breached at the cost of a fine.
        401:
          $ref: '#/responses/Unauthorized'

  '/trader':
    get:
      summary: Gets information about the currently signed in trader.
      description: Gets information about the currently signed in trader.
      responses:
        200:
          description: OK
          schema:
            type: object
            properties:
              trader_id:
                type: string
              first_name:
                type: string
              last_name:
                type: string
              nlv:
                type: number
                description: Net liquid value.
        401:
          $ref: '#/responses/Unauthorized'
          
  '/limits':
    get:
      summary: Trading limits for the current case.
      description: Trading limits for the current case.
      responses:
        200:
          description: OK
          schema:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                  description: Label for the trading limit.
                gross:
                  type: number
                  description: Trader's current gross risk level.
                net:
                  type: number
                  description: Trader's current net risk level.
                gross_limit:
                  type: number
                  description: Gross risk limit for the case. If exceeded, the trader will be fined.
                net_limit:
                  type: number
                  description: Net risk limit for the case. If exceeded, the trader will be fined.
                gross_fine:
                  type: number
                  description: Per risk unit fine for exceeding the gross risk limit.
                net_fine:
                  type: number
                  description: Per risk unit fine for exceeding the net risk limit.
        401:
          $ref: '#/responses/Unauthorized'
          
  '/news':
    get:
      summary: Gets the most recent news.
      description: Gets the most recent news.
      parameters: 
      - name: since
        in: query
        type: number
        required: false
        description: Retrieve only news items *after* a particular news id.
      - name: limit
        in: query
        type: number
        required: false
        description: Result set limit, counting backwards from the most recent news item. Defaults to `20`.
      responses:
        200:
          description: OK
          schema:
            type: array
            items:
              type: object
              properties:
                news_id:
                  type: integer
                period:
                  type: integer
                tick:
                  type: integer
                ticker:
                  type: string
                headline:
                  type: string
                body:
                  type: string
        401:
          $ref: '#/responses/Unauthorized'

  '/assets':
    get:
      summary: Gets a list of available assets.
      description: Gets a list of available assets.
      parameters:
      - name: ticker
        in: query
        type: string
        required: false
      responses:
        200:
          description: OK
          schema:
            type: array
            items:
              type: object
              properties:
                ticker:
                  type: string
                type:
                  type: string
                  enum: *ASSET_TYPE
                description:
                  type: string
                total_quantity:
                  type: integer
                available_quantity:
                  type: integer
                lease_price:
                  type: number
                convert_from:
                  type: array
                  items:
                    $ref: '#/definitions/TickerQuantity'
                convert_to:
                  type: array
                  items:
                    $ref: '#/definitions/TickerQuantity'
                containment:
                  $ref: '#/definitions/TickerQuantity'
                ticks_per_conversion:
                  type: integer
                ticks_per_lease:
                  type: integer
                is_available:
                  type: boolean
                start_period:
                  type: integer
                stop_period:
                  type: integer
        401:
          $ref: '#/responses/Unauthorized'  

  '/assets/history':
    get:
      summary: Gets the activity log for assets.
      description: Gets the activity log for assets.
      parameters:
      - name: ticker
        in: query
        type: string
        required: false
      - name: period
        in: query
        type: number
        required: false
        description: Period to retrieve data from. Defaults to the current period.
      - name: limit
        in: query
        type: number
        required: false
        description: Result set limit, counting backwards from the most recent tick. Defaults to retrieving the entire period.
      responses:
        200:
          description: OK
          schema:
            type: array
            items:
              type: object
              properties:
                ticker:
                  type: string
                tick:
                  type: integer
                action:
                  type: string
                cost:
                  type: number
                convert_from:
                  type: array
                  items:
                    $ref: '#/definitions/TickerQuantity'
                convert_to:
                  type: array
                  items:
                    $ref: '#/definitions/TickerQuantity'
                convert_from_price:
                  type: array
                  items:
                    $ref: '#/definitions/TickerQuantity'
                convert_to_price:
                  type: array
                  items:
                    $ref: '#/definitions/TickerQuantity'
        401:
          $ref: '#/responses/Unauthorized'  
          

  '/securities':
    get:
      summary: Gets a list of available securities and associated positions.
      description: Gets a list of available securities and associated positions.
      parameters:
      - name: ticker
        in: query
        type: string
        required: false
      responses:
        200:
          description: OK
          schema:
            type: array
            items:
              type: object
              properties:
                ticker:
                  type: string
                type:
                  type: string
                  enum: *SECURITY_TYPE
                size:
                  type: integer
                position:
                  type: number
                vwap:
                  type: number
                nlv:
                  type: number
                last:
                  type: number
                bid:
                  type: number
                bid_size:
                  type: number
                ask:
                  type: number
                ask_size:
                  type: number
                volume:
                  type: number
                unrealized:
                  type: number
                realized:
                  type: number
                currency:
                  type: string
                total_volume:
                  type: number
                limits:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      units:
                        type: number
                interest_rate:
                  type: number
                is_tradeable:
                  type: boolean
                is_shortable:
                  type: boolean
                start_period:
                  type: integer
                stop_period:
                  type: integer
                description:
                  type: string
                unit_multiplier:
                  type: integer
                display_unit:
                  type: string
                start_price:
                  type: number
                min_price:
                  type: number
                max_price:
                  type: number
                quoted_decimals:
                  type: integer
                trading_fee:
                  type: number
                limit_order_rebate:
                  type: number
                min_trade_size:
                  type: number
                max_trade_size:
                  type: number
                required_tickers:
                  type: string
                bond_coupon:
                  type: number
                interest_payments_per_period:
                  type: integer
                base_security:
                  type: string
                fixing_ticker:
                  type: string
                api_orders_per_second:
                  type: integer
                execution_delay_ms:
                  type: integer
                interest_rate_ticker:
                  type: string
                otc_price_range:
                  type: number
        401:
          $ref: '#/responses/Unauthorized'

  '/securities/book':
    get:
      summary: Gets the order book of a security.
      description: Gets the order book of a security.
      parameters:
      - name: ticker
        in: query
        type: string
        required: true
      - name: limit
        in: query
        type: number
        required: false
        description: Maximum number of orders to return for each side of the order book. Defaults to `20`.
      responses:
        200:
          description: OK
          schema:
            type: object
            properties:
              bid:
                type: array
                items:
                  $ref: '#/definitions/Order'
              ask:
                type: array
                items:
                  $ref: '#/definitions/Order'
        401:
          $ref: '#/responses/Unauthorized'
          
  '/securities/history':
    get:
      summary: Gets the OHLC history for a security.
      description: Gets the OHLC history for a security.
      parameters:
      - name: ticker
        in: query
        type: string
        required: true
      - name: period
        in: query
        type: number
        required: false
        description: Period to retrieve data from. Defaults to the current period.
      - name: limit
        in: query
        type: number
        required: false
        description: Result set limit, counting backwards from the most recent tick. Defaults to retrieving the entire period.
      responses:
        200:
          description: OK
          schema:
            type: array
            items:
              type: object
              properties:
                tick:
                  type: integer
                open:
                  type: number
                high:
                  type: number
                low:
                  type: number
                close:
                  type: number
              example: 
                tick: 11
                open: 4.12
                high: 4.21
                low: 4.10
                close: 4.15
        401:
          $ref: '#/responses/Unauthorized'
  
  '/securities/tas':
    get:
      summary: Gets time & sales history for a security.
      description: 
        Gets time & sales history for a security. Data is anonymized. There are two modes of retrieval for this endpoint. 
      
        
        If `after` is specified, then only data with an `id` value greater than `after` will be returned. This allows only incremental data to be retrieved by storing the last `id` value returned. Setting `after=0` will return all time & sales data.
        
        
        Alternatively, specifying `period` & `limit` will fetch data from the corresponding period and tick window. For example, setting `limit=0` returns only data from the current period and current tick.
      parameters:
      - name: ticker
        in: query
        type: string
        required: true
      - name: after
        in: query
        type: number
        required: false
        description: Retrieve only data with an `id` value greater than this value.
      - name: period
        in: query
        type: number
        required: false
        description: Period to retrieve data from. Defaults to the current period.
      - name: limit
        in: query
        type: number
        required: false
        description: Ticks to include, counting backwards from the most recent tick. Defaults to retrieving the entire period.
      responses:
        200:
          description: OK
          schema:
            type: array
            items:
              type: object
              properties:
                id:
                  type: integer
                period:
                  type: integer
                tick:
                  type: integer
                price:
                  type: number
                quantity:
                  type: number
              example: 
                id: 10
                period: 1
                tick: 50
                price: 4.10
                quantity: 10
        401:
          $ref: '#/responses/Unauthorized'

  '/orders':
    get:
      summary: Gets a list of all orders.
      description: Gets a list of all orders.
      parameters:
        - in: query
          name: status
          type: string
          enum: *ORDER_STATUS
          description: The status of the orders to return. Defaults to `OPEN`.
      responses:
        200:
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/Order'
        401:
          $ref: '#/responses/Unauthorized'
    post:
      summary: Insert a new order.
      description: Insert a new order. Note that this endpoint is rate-limited. If the rate limit is exceeded, the response will return HTTP code `429` and will contain a `wait` field and a `Retry-After` header indicating the number of seconds to wait before trying again. 
      parameters:
        - in: query
          name: ticker
          type: string
          required: true
        - in: query
          name: type
          type: string
          enum: *ORDER_TYPE
          required: true
        - in: query
          name: quantity
          type: number
          required: true
        - in: query
          name: action
          type: string
          enum: *ORDER_ACTION
          required: true
        - in: query
          name: price
          type: number
          description: Required if `type` is `LIMIT`. Ignored otherwise.
        - in: query
          name: dry_run
          type: number
          enum:
            - 0
            - 1
          description: Only available if `type` is `MARKET`. *Simulates* the order execution and returns the result as if the order was executed.
      responses:
        200:
          description: OK
          headers:
            'X-Wait-Until':
              type: number
              description: Number of seconds to wait before attempting another order insertion against the same ticker (otherwise the rate limit will be exceeded).
          schema:
            $ref: '#/definitions/Order'
        401:
          $ref: '#/responses/Unauthorized'
        429:
          $ref: '#/responses/RateLimitExceeded'
          
  '/orders/{id}':
    parameters:
      - name: id
        in: path
        type: integer
        required: true
        description: The id of the order.
    get:
      summary: Gets the details of a specific order.
      description: Gets the details of a specific order.
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/Order'
        401:
          $ref: '#/responses/Unauthorized'
    delete:
      summary: Cancel an open order.
      description: Cancel an open order.
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/SuccessResult'
        401:
          $ref: '#/responses/Unauthorized'
          
  '/tenders':
    get:
      summary: Gets a list of all active tenders.
      description: Gets a list of all active tenders.
      responses:
        200:
          description: OK
          schema:
            type: array
            items:
              type: object
              properties:
                tender_id:
                  type: integer
                period:
                  type: integer
                tick:
                  type: integer
                expires:
                  type: integer
                caption:
                  type: string
                quantity:
                  type: number
                action:
                  type: string
                  enum: *ORDER_ACTION
                is_fixed_bid:
                  type: boolean
                price:
                  type: number
                  description: Will be non-null if `is_fixed_bid` is `true`.
        401:
          $ref: '#/responses/Unauthorized'
    
  '/tenders/{id}':
    parameters:
      - name: id
        in: path
        type: integer
        required: true
        description: The id of the tender.
    post:
      summary: Accept the tender.
      description: Accept the tender.
      parameters:
      - name: price
        in: query
        type: number
        description: Required if the tender is not fixed-bid.
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/SuccessResult'
        401:
          $ref: '#/responses/Unauthorized'
    delete:
      summary: Decline the tender.
      description: Decline the tender.
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/SuccessResult'
        401:
          $ref: '#/responses/Unauthorized'
          
  '/leases':
    get:
      summary: List of all assets currently being leased or being used.
      description: List of all assets currently being leased or being used.
      responses:
        200:
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/AssetLease'
        401:
          $ref: '#/responses/Unauthorized'
    post:
      summary: Lease or use an asset.
      description: Lease or use an asset. Depending on the type of asset, you will need to specify the `fromN` and `quantityN` parameters. Only specify subsequent `fromN` & `quantityN` parameters if needed.
      parameters:
      - name: ticker
        in: query
        type: string
        required: true
        description: Ticker of the asset to lease or use.
      - name: from1
        in: query
        type: string
        required: false
        description: Required for assets that can be used without leasing first (such as REFINERY type assets). Specifies the source ticker.
      - name: quantity1
        in: query
        type: number
        required: false
        description: Required for assets that can be used without leasing first (such as REFINERY type assets). Specifies the source quantity.
      - name: from2
        in: query
        type: string
        required: false
        description: Specifies the 2nd source ticker (if required).
      - name: quantity2
        in: query
        type: number
        required: false
        description: Specifies the 2nd source quantity (if required).
      - name: from3
        in: query
        type: string
        required: false
        description: Specifies the 3rd source ticker (if required).
      - name: quantity3
        in: query
        type: number
        required: false
        description: Specifies the 3rd source quantity (if required).
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/AssetLease'
        401:
          $ref: '#/responses/Unauthorized'
  
  '/leases/{id}':
    parameters:
      - name: id
